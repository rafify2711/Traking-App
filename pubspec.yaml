name: tracking_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  analyzer: ^6.0.0
  awesome_dialog: ^3.2.1
  bloc: ^9.0.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  easy_localization: ^3.0.7+1
  pinput:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
 
  flutter_secure_storage: ^9.2.4
  flutter_settings_ui: ^3.0.1
  flutter_svg: ^2.0.17
  fluttertoast: ^8.2.12
  geocoding: ^3.0.0
  geolocator: ^14.0.0
  get_it: ^8.0.3
  google_maps_flutter: ^2.12.1
  hash_cached_image: ^0.0.2
  image_dot_indicator: ^0.0.9
  image_picker: ^1.0.7
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  logger: ^2.4.0
  lottie: ^3.3.1
  mockito: ^5.0.0
  onbackground_shared_prefrences: ^0.0.2
  pretty_dio_logger: ^1.4.0
  provider: ^6.1.4
  retrofit: ^4.4.0
  smooth_page_indicator: ^1.2.1
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.3.3
  flutter_test:
    sdk: flutter
  injectable_generator: null
  json_serializable: ^6.8.0
  retrofit_generator: '>=8.0.0 <10.0.0'
  test: ^1.25.15

flutter:
  uses-material-design: true

  assets:
    
    - assets/translations/
 

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_18pt-Medium.ttf
        - asset: assets/fonts/inter/Inter_24pt-Regular.ttf
        - asset: assets/fonts/inter/Inter_24pt-SemiBold.ttf
        - asset: assets/fonts/inter/Inter_28pt-Bold.ttf

    - family: Roboto
      fonts:
        - asset: assets/fonts/roboto/Roboto-Medium.ttf

    - family: IM Fell English
      fonts:
        - asset: assets/fonts/IM Fell English/IMFellEnglish-Regular.ttf

